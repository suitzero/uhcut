<div class="toolbar-container">
    <input #fileInput type="file" multiple accept="video/*,audio/*,.m4a" style="display:none" (change)="handleFiles($event)">

    <button (click)="onAddMedia()" class="tool-btn" [title]="i18n.t('add')">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        <span>{{ i18n.t('add') }}</span>
    </button>
    <button (click)="toggleRecording()" class="tool-btn" [class.active]="isRecording()" [title]="i18n.t('record')">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
        <span>{{ i18n.t('record') }}</span>
    </button>
    <button (click)="toggleVideoRecording()" class="tool-btn" [class.active]="isVideoRecording()" [title]="i18n.t('recordVideo')">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
        <span>{{ i18n.t('recordVideo') }}</span>
    </button>
    <button (click)="toggleTranscribe()" class="tool-btn" [class.active]="isTranscribing()" [title]="i18n.t('caption')">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-9 12H6v-2h5v2zm4-4H6v-2h9v2zm4-4H6V6h13v2z"/></svg>
        <span>{{ i18n.t('caption') }}</span>
    </button>
    <div class="separator"></div>

    <button (click)="undo()" class="tool-btn" [title]="i18n.t('undo')">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/></svg>
        <span>{{ i18n.t('undo') }}</span>
    </button>
    <button (click)="redo()" class="tool-btn" [title]="i18n.t('redo')">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M18.4 10.6C16.55 9 14.15 8 11.5 8c-4.65 0-8.58 3.03-9.96 7.22L3.9 16c1.05-3.19 4.05-5.5 7.6-5.5 1.95 0 3.73.72 5.12 1.88L13 16h9V7l-3.6 3.6z"/></svg>
        <span>{{ i18n.t('redo') }}</span>
    </button>

    <div class="separator"></div>

    <button (click)="split()" class="tool-btn" [title]="i18n.t('split')">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M17 15h2v2h-2zm0-4h2v2h-2zm0-4h2v2h-2zm-3.26 0l-1.26 1.26c.71 1.45.69 3.18-.18 4.74l1.26 1.26c1.23-2.06 1.23-4.5.18-7.26zm-3.48 4l-1.26 1.26c.71 1.45.69 3.18-.18 4.74l1.26 1.26c1.23-2.06 1.23-4.5.18-7.26zM7 15h2v2H7zm0-4h2v2H7zm0-4h2v2H7z"/></svg>
        <span>{{ i18n.t('split') }}</span>
    </button>
    <button (click)="deleteClip()" class="tool-btn" [title]="i18n.t('delete')">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
        <span>{{ i18n.t('delete') }}</span>
    </button>

    @if (selectedClipType() === 'video') {
        <button (click)="toggleStabilize()" class="tool-btn" [title]="i18n.t('stabilize')" [class.active]="isStabilized()">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M7 2v11h3v9l7-12h-4l4-8z"/></svg>
            <span>{{ i18n.t('stabilize') }}</span>
        </button>
        <button (click)="extractAudio()" class="tool-btn" [title]="i18n.t('extractAudio')">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
            <span>{{ i18n.t('extractAudio') }}</span>
        </button>
    }
    @if (selectedClipType() === 'video' || selectedClipType() === 'audio') {
        <button (click)="removeSilence()" class="tool-btn" [title]="i18n.t('rmSilence')">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zm2.46-7.12l1.41-1.41L12 12.59l2.12-2.12 1.41 1.41L13.41 14l2.12 2.12-1.41 1.41L12 15.41l-2.12 2.12-1.41-1.41L10.59 14l-2.13-2.12zM15.5 4l-1-1h-5l-1 1H5v2h14V4z"/></svg>
            <span>{{ i18n.t('rmSilence') }}</span>
        </button>
    }

    <div class="separator"></div>

    <button (click)="zoomIn()" class="tool-btn" [title]="i18n.t('zoomIn')">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/><path d="M12 10h-2v2H9v-2H7V9h2V7h1v2h2v1z"/></svg>
        <span>{{ i18n.t('zoomIn') }}</span>
    </button>
    <button (click)="zoomOut()" class="tool-btn" [title]="i18n.t('zoomOut')">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14zM7 9h5v1H7z"/></svg>
        <span>{{ i18n.t('zoomOut') }}</span>
    </button>

    @if (isStabilizing()) {
        <div class="stabilization-progress">
            <span>{{ i18n.t('stabilizing') }}...</span>
            <div class="progress-bar-container">
                <div class="progress-bar" [style.width.%]="stabilizationProgress()"></div>
            </div>
            <span>{{ stabilizationProgress() }}%</span>
        </div>
    }
</div>
