<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stylus Video MVP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Stylus Video MVP</h1>
    <div class="toolbar">
        <div class="color-palette">
            <div class="color-box" style="background-color: white;" data-color="white"></div>
            <div class="color-box" style="background-color: #ff5252;" data-color="#ff5252"></div>
            <div class="color-box" style="background-color: #448aff;" data-color="#448aff"></div>
            <div class="color-box" style="background-color: #69f0ae;" data-color="#69f0ae"></div>
            <div class="color-box" style="background-color: #ffd740;" data-color="#ffd740"></div>
        </div>
        <button id="text-tool-button">Text</button>
        <button id="clear-button">Clear</button>
    </div>
    <canvas id="canvas" width="270" height="480"></canvas>
    <video id="preview" controls></video>
    <div class="controls">
        <button id="record-button">Record</button>
        <button id="preview-button">Preview</button>
        <button id="export-button">Export</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
