<div class="timeline-container">
    <div class="timeline-header">
        <div class="time-ruler" [style.width.px]="totalWidth">
            <!-- Ruler Ticks generated here via ngFor -->
             <div *ngFor="let tick of rulerTicks" class="ruler-tick" [style.left.px]="tick.left">
                 <span>{{ tick.label }}</span>
             </div>
        </div>
    </div>
    <div class="timeline-tracks" #timelineTracks [style.width.px]="totalWidth"
         (dragover)="onDragOver($event)" (drop)="onDrop($event)"
         (click)="onTimelineClick($event)">

        <!-- Video Track -->
        <div class="track" data-type="video">
            <div *ngFor="let clip of videoTrack()"
                 class="clip"
                 [class.selected]="selectedClipId() === clip.id"
                 [style.left.px]="clip.startTime * zoom()"
                 [style.width.px]="clip.duration * zoom()"
                 (click)="onClipClick($event, clip)"
                 (mousedown)="onMouseDown($event, clip)"
                 (touchstart)="onTouchStart($event, clip)">
                <span class="clip-label">
                    @if (clip.stabilized) {
                        <span class="badge" title="Stabilized">⚡</span>
                    }
                    {{ getMediaName(clip) }}
                </span>
                <!-- Thumbnail Logic -->
                <div class="clip-thumbnails" [innerHTML]="thumbnails[clip.id] || ''"></div>
            </div>
        </div>

        <!-- Audio Tracks -->
        <div *ngFor="let track of audioTracks(); let i = index" class="track" data-type="audio">
             <div *ngFor="let clip of track"
                  class="clip audio-clip"
                  [class.selected]="selectedClipId() === clip.id"
                  [style.left.px]="clip.startTime * zoom()"
                  [style.width.px]="clip.duration * zoom()"
                  (click)="onClipClick($event, clip)"
                  (mousedown)="onMouseDown($event, clip)"
                  (touchstart)="onTouchStart($event, clip)">
                 <span class="clip-label">{{ getMediaName(clip) }}</span>
                 <!-- Waveform Logic -->
                 <div class="clip-thumbnails" *ngIf="waveforms[clip.id]"
                      [style.background-image]="'url(' + waveforms[clip.id] + ')'"
                      style="background-size: 100% 100%; opacity: 0.3;">
                 </div>
             </div>
        </div>

    </div>
    <div class="playhead" [style.left.px]="playbackTime() * zoom()"></div>

    <!-- Reorder Overlay -->
    @if (stateService.reorderMode()) {
        <div class="reorder-overlay">
            <div class="reorder-header">
                <h3>Reorder Clips</h3>
                <div>
                    <button class="reorder-btn close-btn" (click)="closeReorderMode()">Cancel</button>
                    <button class="reorder-btn save-btn" (click)="saveReorderMode()">Save</button>
                </div>
            </div>
            <div class="reorder-grid">
                @for (clip of reorderClips; track clip.id; let i = $index) {
                    <div class="reorder-clip"
                         [attr.data-index]="i"
                         [class.dragging]="reorderDragIndex === i || reorderTouchStartIndex === i"
                         [class.drag-over]="reorderDragOverIndex === i"
                         draggable="true"
                         (dragstart)="onReorderDragStart(i)"
                         (dragover)="onReorderDragOver($event, i)"
                         (drop)="onReorderDrop($event, i)"
                         (touchstart)="onReorderTouchStart(i)"
                         (touchmove)="onReorderTouchMove($event)"
                         (touchend)="onReorderTouchEnd()">
                        <div class="reorder-clip-thumb" [innerHTML]="thumbnails[clip.id] || ''"></div>
                        <div class="reorder-clip-name">{{ getMediaName(clip) }}</div>
                    </div>
                }
            </div>
        </div>
    }
</div>
