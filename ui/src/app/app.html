<div class="app-container">
  <!-- Top Bar -->
  <header class="top-bar">
      <div class="logo">UhCut</div>
      <div class="actions">
          <button class="lang-btn" (click)="i18n.toggleLang()">{{ i18n.t(i18n.lang() === 'en' ? 'ko' : 'en') }}</button>
          <button id="export-btn" (click)="exportVideo()">{{ i18n.t('export') }}</button>
      </div>
  </header>

  <!-- Main Workspace -->
  <div class="workspace">
      <!-- Player Component -->
      <app-player></app-player>
  </div>

  <!-- Toolbar Component -->
  <app-toolbar></app-toolbar>

  <!-- Timeline Component -->
  <app-timeline></app-timeline>

  <!-- Export Progress Overlay -->
  @if (state.isExporting()) {
    <div class="export-overlay">
      <div class="export-modal">
        <h3>{{ i18n.t('exporting') }}</h3>
        <div class="progress-bar-container">
          <div class="progress-bar" [style.width.%]="state.exportProgress()"></div>
        </div>
        <p>{{ state.exportProgress() }}%</p>

        @if (state.exportUrl()) {
          <div class="export-actions">
            <p>{{ i18n.t('exportComplete') }}</p>
            <button class="save-btn" (click)="saveExportedVideo()">{{ i18n.t('export') }}</button>
            <button class="close-btn" (click)="closeExport()">{{ i18n.t('close') }}</button>
          </div>
        }
      </div>
    </div>
  }
</div>
